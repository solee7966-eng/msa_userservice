<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}" 
      lang="ko" 
      xmlns:th="http://www.thymeleaf.org"> 
<!-- ::title 은   현재 페이지의 title   태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 첫번째 파라미터로 전달한다. -->
<!-- ::link 는    현재 페이지의 link    태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 두번째  파라미터로 전달한다. -->
<!-- ::style 은   현재 페이지의 style   태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 세번째 파라미터로 전달한다. -->
<!-- ::script 는  현재 페이지의 script  태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 네번째 파라미터로 전달한다. -->
<!-- ::section 은 현재 페이지의 section 태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 다섯번째 파라미터로 전달한다. -->
<!-- 타임리프는 백엔드 서버에서 HTML을 동적으로 렌더링하는 용도로 사용된다. -->

<head>
<meta charset="UTF-8">
<title>JWT(Json Web Token) & JPA(Java Persistence API) 메인 페이지</title>

<link rel="stylesheet" href="" />

<style type="text/css"></style>

<script th:inline="javascript"></script>

</head>

<body>
  
  <section class="container-fluid mt-4">
	<div class="row">	
	  <div class="col-md-10 offset-md-1">
	  
	  	<!--/* Thymeleaf 전용 주석문. 소스보기에서 보이지 않는다.
	  	
	  	     ▣ Thymeleaf 에서 $ 는 Spring MVC의 모델(Model)에 담긴 데이터(속성값)에 접근할 때 사용한다.
	  	       즉, Thymeleaf 에서 ${...} 은 컨트롤러에서 넘긴 데이터인 Spring MVC의 Model 객체나 Request Scope 등에 있는 변수를 참조할 때 사용한다.
               <예시> ${user.name} → Model에 담긴 user 객체의 name 속성 값 출력
               Thymeleaf 에서 ${...} 은 변수 표현식(Variable Expressions)으로 JSP 의 EL (Expression Language) 과 비슷한 역할을 하는 것이다.
             
             
             ▣ Thymeleaf 에서 # 은 Thymeleaf 의 내장 객체 또는 유틸리티 객체에 접근할 때 사용하는 객체(Object) 접근 연산자 이다.
             ----------------------------------------------------------------------------------------------
               예시        	설명	                     사용 예
             ----------------------------------------------------------------------------------------------
               #strings	    문자열 관련 함수            ${#strings.toUpperCase('hello')} → "HELLO"
               #lists	    리스트/컬렉션 관련 함수       ${#lists.size(myList)} → 리스트 크기
               #dates	    날짜/시간 관련 함수	         ${#dates.format(today, 'yyyy-MM-dd')}
               #numbers	    숫자 관련 함수	             ${#numbers.formatInteger(num, 3)}
               #bools	    불리언 처리 함수	         ${#bools.isTrue(flag)}
               #arrays	    배열 관련 함수	             ${#arrays.length(myArray)}
               #maps	    맵 관련 함수	             ${#maps.containsKey(myMap, 'key')}
               #request	    HttpServletRequest 객체	 ${#request.getParameter('id')}
               #session	    HttpSession 객체	         ${#session.getAttribute('user')}  
              
              ※ 예시 ※ 
              <p>리스트 크기: <span th:text="${#lists.size(userList)}"></span></p>
              <p>대문자 변환: <span th:text="${#strings.toUpperCase(userName)}"></span></p>
              <p>요청 파라미터: <span th:text="${#request.getParameter('id')}"></span></p>
              
              
             ▣ Thymeleaf 에서 @{...} 는 URL 표현식(URL Expressions) 을 작성할 때 사용한다.
               URL 경로를 동적으로 만들어주고, Context Path를 자동으로 포함시키는 기능을 한다.
               
               ※ 예시
               <a th:href="@{/login}">로그인</a> 은 서버 context-path가 /myapp일 경우 실제 출력은 
               <a href="/myapp/login">로그인</a> 이 된다.
               
               ▶ 변수 치환 => @{...} 안에서 변수 값을 ${...} 형태로 전달해서 URL을 만들 수 있다.
               ※ 예시
               <a th:href="@{/view/{id}(id=${board.id})}">상세보기</a>   board.id가 100 이면
               <a href="/myapp/view/100">상세보기</a> 이 된다.
               
               ▶ 쿼리 파라미터 추가 => URL 뒤에 파라미터를 붙이고 싶을 때 (...) 안에 key=value 형태로 작성한다. 
               ※ 예시
               <a th:href="@{/search(type=${type}, keyword=${keyword})}">검색</a>   type=title, keyword=java 이라면
               <a href="/myapp/search?type=title&keyword=java">검색</a> 이 된다.
              
               ▶ 절대경로 와 상대경로 
                 / 로 시작  → 서버 루트 기준 절대경로
                 ../      → 상위 폴더 기준 상대경로
                 ~로 시작   → 웹 애플리케이션 루트 기준 
                 
                 ※ 예시
                 @{/css/style.css}      → /myapp/css/style.css
                 @{../img/logo.png}     → 현재 경로 기준 상위폴더의 img/logo.png
                 @{~/index}             → /myapp/index
                 
               ▶ 다른 속성에서도 사용 가능
                 th:src (이미지, JS 파일 경로)
                 th:action (form 전송 URL)
                 th:href (링크)
                 th:background (배경이미지 경로) 등
                 
                 ※ 예시
                 <form th:action="@{/login}" method="post">
                 <img th:src="@{/images/logo.png}">
                 <script th:src="@{/js/main.js}"></script>
                 
	  	*/-->
	  	 <div th:if="${productImageDtoList != null and #lists.isEmpty(productImageDtoList) == false}">
	  	
		    <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
		  
			  <!-- 인디케이터 -->
			  <ol class="carousel-indicators">
			    <!--  HTML 주석문. 소스보기에서 보인다.
			       <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
			       <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
			       <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
			    -->
			    <li th:each="dto, status : ${productImageDtoList}"
			        th:attr="data-target='#carouselExampleIndicators', data-slide-to=${status.index}"
			        th:classappend="${status.index} == 0 ? 'active'">
			    </li>
			    <!--/* status → 반복 상태 변수 (index, count, size, even, odd, first, last 등 제공)
                       예 status.last → 현재 요소가 마지막인지 여부 (true/false) */-->
			  </ol>
		 
			  <!-- 슬라이드 아이템 -->
			  <div class="carousel-inner">
		    
			  <!--/*
				    <div class="carousel-item active">
				      <img src="../images/Koala.jpg" class="d-block w-100" alt="...">    d-block 은 display: block; 이고  w-100 은 width 의 크기는 <div class="carousel-item active">의 width 100% 로 잡으라는 것이다. 
				      <div class="carousel-caption d-none d-md-block">                   d-none 은 display : none; 이므로 화면에 보이지 않다가, d-md-block 이므로 d-md-block 은 width 가 768px이상인 것에서만 display: block; 으로 보여라는 말이다. 
					    <h5>Koala</h5>
					    <p>Koala Content</p>
					  </div>
				    </div>
				    <div class="carousel-item">
				      <img src="../images/Lighthouse.jpg" class="d-block w-100" alt="...">
				      <div class="carousel-caption d-none d-md-block">
					    <h5>Lighthouse</h5>
					    <p>Lighthouse Content</p>
					  </div>		      
				    </div>
				    <div class="carousel-item">
				      <img src="../images/Penguins.jpg" class="d-block w-100" alt="...">
				      <div class="carousel-caption d-none d-md-block">
					    <h5>Penguins</h5>
					    <p>Penguins Content</p>
					  </div>		      
				    </div>
			  */-->
				    <div th:each="dto, status : ${productImageDtoList}"
				         th:class="'carousel-item' + (${status.index} == 0 ? ' active' : '')">
				      
				       <img th:src="@{/images/{img}(img=${dto.imgfilename})}" class="d-block w-100" alt="...">
				      
				       <div class="carousel-caption d-none d-md-block">
				          <h5 th:text="${dto.productname}"></h5>
				          <p th:text="${dto.productname}"></p>
				       </div>
				    </div>
		     
		      </div>
		
		      <!-- 컨트롤 버튼 -->
		      <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
		        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
		        <span class="sr-only">Previous</span>
		      </a>
		      <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
		        <span class="carousel-control-next-icon" aria-hidden="true"></span>
		        <span class="sr-only">Next</span>
		      </a>
		  </div>
		
	    </div>
	   	
	  </div>	 
    </div>
  </section>
  
 </body>
 </html>
