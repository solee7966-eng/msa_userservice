<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::div})}" lang="ko" xmlns:th="http://www.thymeleaf.org"> 
<!-- ::title 은   현재 페이지의 title   태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 첫번째  파라미터로 전달한다. -->
<!-- ::link 는    현재 페이지의 link    태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 두번째  파라미터로 전달한다. -->
<!-- ::style 은   현재 페이지의 style   태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 세번째  파라미터로 전달한다. -->
<!-- ::script 는  현재 페이지의 script  태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 네번째  파라미터로 전달한다. -->
<!-- ::section 은 현재 페이지의 section 태그를 읽어다가 templates/layout/layout_main.html 파일의 th:fragment="layout(title, link, css, script, content)" 에 있는 다섯번째 파라미터로 전달한다. -->

<head>
<meta charset="UTF-8">
<title>회원가입 결과</title>
<link rel="stylesheet" href="" />
<style type="text/css"></style>
<script th:inline="javascript"></script>
</head>
<body>

	<div style="width: 80%; margin: auto; padding: 5%;">
		<div>[(${message})]</div>
		
		<div th:if="${success == '1'}" style="margin-top: 5%;">    
		    <a th:href="@{/user-service/member/login}">로그인 페이지로 이동</a>  
		</div>  
	
		<div th:if="${success == '0'}" style="margin-top: 5%;">    
		    <a th:href="@{/user-service/member/register}">회원가입 페이지로 이동</a>          
		</div>  
	</div>
	
</body>
</html>
